<!DOCTYPE html>
<html>
<head>
    <title> арта</title>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=0c07c093-fa33-4994-8ea4-8e1c06c1f02f&lang=ru_RU" type="text/javascript"></script>
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        ymaps.ready(init);
        function init() {
            var myMap = new ymaps.Map("map", {
                center: [51.7373, 36.1874], //  оординаты  урска
                zoom: 15
            });
            myMap.geoObjects.add(new ymaps.Placemark([51.7373, 36.1874], {
                balloonContent: "÷веточный магазин Flower Shop"
            }));
        }
    </script>
</body>
</html>
